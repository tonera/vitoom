services:
  backend:
    image: ${VITOOM_BACKEND_IMAGE:-vitoom-backend:latest-${VITOOM_TARGET_ARCH:-x86_64}}
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        APT_MIRROR: ${APT_MIRROR:-}
        VITOOM_TARGET_ARCH: ${VITOOM_TARGET_ARCH:-x86_64}
        VITOOM_VERSION: ${VITOOM_VERSION:-}
        PANDOC_VERSION: ${PANDOC_VERSION:-3.6.4}
        ELASTICSEARCH_VERSION: ${ELASTICSEARCH_VERSION:-8.15.5}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    container_name: vitoom-backend
    restart: unless-stopped
    environment:
      VITOOM_SERVER_HOST: ${VITOOM_SERVER_HOST:-0.0.0.0}
      VITOOM_SERVER_PORT: ${VITOOM_SERVER_PORT:-8888}
      VITOOM_SERVER_DEBUG: ${VITOOM_SERVER_DEBUG:-false}
      VITOOM_SERVER_RELOAD: ${VITOOM_SERVER_RELOAD:-false}
      VITOOM_BACKEND_URL: ${VITOOM_BACKEND_URL:?Set VITOOM_BACKEND_URL in .env, for example http://BACKEND_IP:8888}
      VITOOM_SERVER_LIVETALKING_URL: ${VITOOM_SERVER_LIVETALKING_URL:-}
      VITOOM_INFERENCE_UPLOAD_AUTH_SECRET: ${VITOOM_INFERENCE_UPLOAD_AUTH_SECRET:?Set VITOOM_INFERENCE_UPLOAD_AUTH_SECRET in .env}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:?Set DEFAULT_ADMIN_PASSWORD in .env (run scripts/setup_vitoom.py)}
      ELASTICSEARCH_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      KNOWLEDGE_BASE_ES_URL: ${KNOWLEDGE_BASE_ES_URL:-http://127.0.0.1:9200}
      KNOWLEDGE_BASE_ES_USERNAME: ${KNOWLEDGE_BASE_ES_USERNAME:-}
      KNOWLEDGE_BASE_ES_PASSWORD: ${KNOWLEDGE_BASE_ES_PASSWORD:-}
      HR_BUSINESS_QUERY_ES_PASSWORD: ${HR_BUSINESS_QUERY_ES_PASSWORD:-}
      OPENCLAW_ENABLED: ${OPENCLAW_ENABLED:-false}
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-}
      OPENCLAW_TOKEN: ${OPENCLAW_TOKEN:-}
      VITOOM_SUPERVISOR_URL: ${VITOOM_SUPERVISOR_URL:-}
      VITOOM_SUPERVISOR_AGENT_PORT: ${VITOOM_SUPERVISOR_AGENT_PORT:-9001}
    ports:
      - "${VITOOM_SERVER_PORT:-8888}:${VITOOM_SERVER_PORT:-8888}"
    volumes:
      - ./data/config:/app/config
      - ./data/inference/config:/app/inference/config
      - ./data/resources:/app/resources
      - ./data/logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:${VITOOM_SERVER_PORT:-8888}/api/health || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - vitoom-net

networks:
  vitoom-net:
    name: vitoom-net
