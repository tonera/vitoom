      domain: hr
      entity: employee
      intent: aggregation
      filters:
      - field: office_city
        op: '='
        value: 深圳
      group_by:
      - department_code
      metrics:
      - type: count
        field: employee_id
      limit: 20
  - tags:
    - list
    - active_employee
    - office_city
    query: 旧金山有哪些人？
