tools:
  - name: "list_available_tools"
    description: "列出当前已上线且可用的 Agent 工具能力，帮助用户了解系统现在能做什么。仅当用户询问『你有哪些工具/你能做什么/当前有哪些能力』这类工具能力清单问题时使用；不要用于 slash command 帮助或执行具体任务。"
    tags: ["tools", "capabilities", "工具列表", "能力清单", "功能介绍"]
    aliases: ["available tools", "list tools", "capabilities", "能力列表", "工具清单"]
    examples: ["你现在能用工具吗", "你有哪些工具", "你能做什么", "当前有哪些能力", "show available tools"]
    negative_examples: ["帮我画一张图", "把这段文字念出来", "把这个 pdf 转成 markdown", "帮我规划旅行", "搜索最新资料"]
    intent_anchors:
      - "列出系统当前可用工具"
      - "介绍当前支持的能力"
      - "查看 Agent 工具能力"
    input_modalities: ["text"]
    provider: "local"
    enabled: true

  - name: "list_slash_commands"
    description: "列出当前系统支持的 slash command 命令列表。仅当用户询问『你支持哪些命令/你有哪些可用命令』或输入『/help』这类命令帮助问题时使用；不要用于介绍 Agent 工具能力，也不要用于执行具体命令。"
    tags: ["slash", "command", "help", "命令列表", "可用命令", "slash命令", "帮助", "/help"]
    aliases: ["slash commands", "available commands", "supported commands", "help command", "/help", "命令清单", "可用命令"]
    examples: ["你支持哪些命令？", "你有哪些可用命令", "有哪些 slash command", "/help", "show slash commands"]
    negative_examples: ["你有哪些工具", "你能做什么", "当前有哪些能力", "帮我画一张图", "把这段文字念出来"]
    intent_anchors:
      - "列出系统支持的 slash command"
      - "查看可用命令列表"
      - "显示 /help 帮助"
    input_modalities: ["text"]
    provider: "local"
    enabled: true

  - name: "tavily_search"
    description: "使用 Tavily 联网搜索公开网页内容，适合旅行规划、旅游建议、公开事实补充、新闻和实时网页检索。用户询问旅游目的地、行程、景点、美食、攻略、天气交通、新闻等公开网页内容时优先使用。"
    tags: ["web", "search", "travel", "research", "联网", "旅游", "旅行", "攻略", "景点"]
    aliases: ["internet search", "web search", "online search", "旅行规划", "旅游攻略", "北京旅游", "景点查询", "ウェブ検索", "ネット検索"]
    examples: ["search the web for latest news", "搜索最新新闻", "我想去北京旅游", "帮我规划北京三日游", "北京有哪些值得去的景点", "你懂旅游信息吗", "最新情報を検索して", "在网上找找","从网上搜索"]
    negative_examples:
      - "查询员工资料"
      - "查一下这个员工"
      - "陈五100这个员工的资料"
      - "北京办公室有多少员工"
      - "员工组织关系"
      - "给我某个员工的简历"
    intent_anchors:
      - "联网搜索网页信息"
      - "旅行规划和旅游攻略"
      - "查询目的地景点美食交通等公开信息"
      - "明显具有时效性的信息查询"
    input_modalities: ["text"]
    provider: "local"
    enabled: true

  - name: "process_url_content"
    description: "统一处理用户提供的网页、文档、图片、视频、PDF、Office、文本或压缩包 URL。适合总结/分析 URL 内容、文档转 Markdown/PDF、图片/PDF OCR 文字/表格/公式、指定字段抽取、zip 清单检查等 URL 内容任务。普通 Master Agent 遇到 URL 内容处理时优先使用本工具；不要同时暴露 web_page_reader/analyze_media/document_to_markdown/document_to_pdf/table_to_excel 这类底层 member。"
    tags: ["url", "webpage", "document", "media", "ocr", "pdf", "office", "zip", "网页", "文档", "图片", "视频", "OCR", "内容处理"]
    aliases: ["process URL content", "URL content", "summarize URL", "analyze URL", "文档处理", "链接内容处理", "URL内容处理"]
    examples:
      - "总结一下这个 PDF https://example.com/report.pdf"
      - "这个网页主要讲什么 https://example.com/article"
      - "分析这张图片 https://example.com/a.png"
      - "把这个文档转成 Markdown https://example.com/a.docx"
      - "把这个文件转成 PDF https://example.com/a.md"
      - "把图里的表格导出 Excel https://example.com/table.png"
      - "请将图片中的姓名、年龄、籍贯提取出来 https://example.com/card.jpg"
      - "summarize this document https://example.com/a.pdf"
      - "extract invoice number and total from this PDF https://example.com/invoice.pdf"
    negative_examples:
      - "搜索最新新闻"
      - "我想去北京旅游"
      - "查询员工资料"
      - "查一下知识库里的报销流程"
      - "把这段文字念出来"
      - "画一张猫的图片"
    intent_anchors:
      - "处理用户给定 URL 的内容"
      - "总结或分析网页文档图片视频链接"
      - "把 URL 文档转换为 Markdown 或 PDF"
      - "从图片或 PDF URL 中 OCR 提取文字表格公式字段"
      - "inspect or convert a provided document URL"
    input_modalities: ["text", "image", "video", "document"]
    provider: "local"
    enabled: true

  - name: "web_page_reader"
    description: "读取用户给出的单个普通网页 URL 正文，适合『总结这个网页』『这篇文章讲什么』『这个页面主要内容是什么』『帮我看一下这个链接内容』这类需要打开网页并基于页面内容回答的问题。不要用于联网搜索多个结果、旅游攻略或新闻检索；这些使用 tavily_search。不要用于图片/视频 URL、PDF、Office 文档或文件转换；图片视频使用 analyze_media，文档使用文档工具。"
    tags: ["web", "webpage", "url", "reader", "网页", "链接", "网页读取", "网页总结", "文章总结"]
    aliases: ["read web page", "scrape website", "summarize webpage", "网页内容", "读取网页", "总结网页", "链接内容", "ページ要約"]
    examples:
      - "总结一下这个网页 https://example.com/article"
      - "这个链接主要讲什么？https://example.com/news/123"
      - "帮我看一下这个页面的主要内容"
      - "what is this web page about https://example.com/post"
    negative_examples:
      - "搜索最新新闻"
      - "我想去北京旅游"
      - "帮我规划北京三日游"
      - "分析这张图片 https://example.com/a.jpg"
      - "这视频讲了什么 https://example.com/a.mp4"
      - "把这个 pdf 转成 markdown"
      - "查询员工资料"
    intent_anchors:
      - "读取单个网页 URL 内容"
      - "总结用户提供的网页正文"
      - "基于给定网页链接回答主要内容"
    input_modalities: ["text"]
    provider: "local"
    enabled: true

  - name: "analyze_media"
    description: "当用户明确希望对某一张图片或某一段视频的 URL 进行理解/描述/问答/摘要时调用。只有真正需要读取媒体内容的请求才使用；若用户只是整理链接、生成文案等不依赖画面的任务，请不要调用。"
    tags: ["multimodal", "vision", "image", "video", "media", "媒体分析", "图片", "视频"]
    aliases: ["image analysis", "video analysis", "describe image", "图片内容", "图片中是什么", "画像解析", "動画解析"]
    examples: ["describe this image", "what is in this image", "这张图片中是什么", "这张图里有什么", "图片里有小狗吗", "这视频讲了什么", "分析这个视频内容", "この画像を説明して"]
    # 负例只放"反向意图的核心动词/句式"，不要带具体物体名（如『小狗』『头像』），
    # 否则 query 里出现同名物体时会反向自伤（query『画一张小狗头像』被『帮我画一张』
    # 当成自己的负例打高分）。
    negative_examples: ["generate an image", "create an image", "draw a picture", "edit this image", "把这张图改成", "把这张图换个背景", "去水印", "画像を作って"]
    intent_anchor: "理解或描述用户给定的图片或视频内容"
    input_modalities: ["image", "video"]
    provider: "local"
    enabled: true

  - name: "image_generator"
    description: "根据中文文本描述**生成新图片**（文生图/text-to-image，可选附带参考图做风格/构图引导）。仅当用户明确提出『画一张/生成一张/帮我画』等图片生成需求时使用；不要用于分析已有 URL 的图片（那是 analyze_media 的职责）；用户给了原图 URL 想『改/编辑/换背景/抠图/去水印』时请改用 image_editor。model_name 可选，用户没提时直接使用后端默认模型即可，不要反问用户。工具返回 files[] 供客户端附件/下载区展示；最终文字回答只需简短总结生成结果，不要内嵌 Markdown 图片、URL 或文件路径。"
    tags: ["image", "generate", "文生图", "画图", "生成图片", "txt2img", "AI绘画"]
    aliases: ["text to image", "image generation", "draw picture", "画像生成", "絵を描く"]
    examples: ["generate an image of a cat", "帮我画一张头像", "画一只小狗", "参考这张图的风格画一只小狗", "猫の画像を作って"]
    # 负例只描"反向意图的核心动词/问句"，不要带物体名（『小狗』/『头像』等），
    # 否则用户写『画个小狗』时会被『图片里有小狗吗』反向打分。
    negative_examples: ["describe this image", "what is in this image", "这张图里是什么", "这张图片中是什么", "分析这张图片", "edit this image", "把这张图改成", "把这张图换个背景", "去水印", "この画像を説明して"]
    intent_anchor: "根据文字描述生成新图片"
    input_modalities: ["text", "image"]
    provider: "local"
    enabled: true

  - name: "image_editor"
    description: "对用户提供的**已有图片**做编辑（修图/图生图编辑/img2img edit）。典型触发：『把这张图换个背景』『给这张图去水印』『把 A 图改成水彩风』『对这张图做局部重绘』等。**必须提供至少一张原图 URL**，放进 tpl_list 字段（List[str]，允许只有一条）；prompt 字段用来描述『希望把图改成什么样』。不要自己编造 model_name（本工具不接受该参数）。与 image_generator 的区别：image_generator 从零生成新图（可选参考图），image_editor 必须基于用户给的原图做编辑；语义不同，输出也不同。工具返回 files[]：向用户写链接时有 thumb_url 用 thumb_url，否则用 url，须原样复制。"
    tags: ["image", "edit", "image_edit", "img2img", "修图", "编辑图片", "改图", "换背景", "抠图", "去水印", "局部重绘", "风格迁移"]
    aliases: ["image edit", "edit existing image", "retouch image", "画像編集", "画像を修正"]
    examples: ["remove the watermark from this image", "把这张图换个背景", "把这张照片改成水彩风格", "この画像の背景を変えて"]
    # 负例只放"反向意图的核心动词/问句"，避免带物体名导致 query 自伤。
    negative_examples: ["generate an image from scratch", "create a new image", "draw a picture", "describe this image", "what is in this image", "这张图片中是什么", "这是什么图片", "分析这张图片", "画像を作って"]
    intent_anchor: "对用户提供的现有图片做编辑（换背景/抠图/去水印/局部重绘）"
    input_modalities: ["image"]
    provider: "local"
    enabled: true

  - name: "video_generator"
    description: "根据中文文本描述或参考图/视频生成新视频（文生视频/图生视频/视频编辑）。仅当用户明确提出『生成一段视频/做个动画/合成视频』等视频需求时使用；不要用于分析已有 URL 的视频（那是 analyze_media 的职责），也不要与 image_generator 混用。model_name 可选，用户没提时直接使用后端默认模型即可，不要反问用户。工具返回 files[]：向用户写链接时有 thumb_url 用 thumb_url，否则用 url，须原样复制。"
    tags: ["video", "generate", "文生视频", "图生视频", "视频生成", "txt2video", "AI视频"]
    aliases: ["text to video", "video generation", "make animation", "動画生成", "ビデオ生成"]
    examples: ["generate a short video", "做一段动画", "把这张图变成会动的", "短い動画を作って"]
    negative_examples: ["describe this video", "这视频讲了什么", "分析这个视频", "transcribe this audio"]
    intent_anchor: "根据文字描述或参考图生成新视频"
    input_modalities: ["text", "image"]
    provider: "local"
    enabled: true

  - name: "audio_asr"
    description: "把一段音频 URL 转写为文字（语音识别 / speech-to-text）。仅当用户明确要求『把这段音频转成文字 / 识别这段语音 / 帮我听写』并提供了音频 URL 时使用；不要用来分析图片/视频或做文本生成。本工具不接受 model_name 参数，后端会自动选用合适的 ASR 模型，不要反问用户。若回复中附文本结果：files[]则直接用里面的url原样复制作为试听链接。"
    tags: ["audio", "asr", "speech-to-text", "stt", "语音转文字", "语音识别", "听写", "转录"]
    aliases: ["speech to text", "audio transcription", "transcribe audio", "音声認識", "文字起こし"]
    examples: ["transcribe this audio", "把这段录音转成文字", "识别一下这段语音", "この音声を書き起こして"]
    negative_examples:
      - "read this text aloud"
      - "generate speech"
      - "把这段文字念出来"
      - "音声を合成して"
    intent_anchors:
      - "把已有的音频文件转写成文字"
      - "把录音的内容听写成文本"
    input_modalities: ["audio"]
    provider: "local"
    enabled: true

  - name: "audio_tts"
    description: "把一段单人/单段文本合成为语音（文字转语音 / text-to-speech）。仅当用户明确要求『把这段文字转成语音 / 念出来 / 用某个音色说出来 / 模仿这段录音说...』时使用；不要用来生成背景音乐或改写文本。若用户要求 LLM 先创作多角色对白、人物对话、广播剧、有声剧、A/B/C 多人配音并输出一个合成音频文件，必须改用 audio_drama_tts，不要用本工具。支持三种模式（字段 tts_mode，不填按以下规则推断）：(1) custom_voice 默认——从 9 个预置说话人（aiden/dylan/eric/ono_anna/ryan/serena/sohee/uncle_fu/vivian）里选一个，用户明确指定了说话人时填 speaker_name；(2) voice_design——用户只描述声线（如『沙哑的中年男声』『撒娇的萝莉音』）但没指定具体 speaker，把描述写进 instruct，不要填 speaker_name；(3) voice_clone——用户提供了参考音频 URL 并要求模仿那段录音时使用，必须同时填 ref_audio（音频 URL 或本地路径）和 ref_text（音频里所念的原文），不要填 speaker_name/instruct。本工具不接受 model_name 参数，后端会按 tts_mode 自动选用权重；不要反问用户模型名，也不要把 URL 填成 ref_audio 之外的任何字段。若回复中附文本结果：files[]则直接用里面的url原样复制作为试听链接。"
    tags:
      - "audio"
      - "tts"
      - "text-to-speech"
      - "文字转语音"
      - "语音合成"
      - "念出来"
      - "朗读"
      - "voice_clone"
      - "克隆声音"
      - "模仿声音"
    aliases:
      - "text to speech"
      - "speech synthesis"
      - "read aloud"
      - "音声合成"
      - "読み上げ"
    examples:
      - "read this text aloud"
      - "把这段文字转成语音"
      - "用这个音色念这段话"
      - "请念出这段话"
      - "この文章を読み上げて"
    negative_examples:
      - "transcribe this audio"
      - "把这段录音转成文字"
      - "识别这段语音"
      - "听写一下这段录音"
      - "文字起こしして"
      - "请写一段三人对白并生成语音"
      - "场景是雪山，A/B/C 分别是什么声音，生成一段广播剧音频"
      - "把这段多角色剧本做成配音文件"
      - "请设计人物对白、角色声音色彩，并合成一个音频文件"
    intent_anchors:
      - "把文字朗读成语音"
      - "用某种声音或音色把文字念出来"
      - "用某种语气把文字说出来"
      - "用指定语言把这段文字说出来"
    input_modalities: ["text", "audio"]
    provider: "local"
    enabled: true

  - name: "audio_drama_tts"
    description: "把多角色对白/人物对话/广播剧脚本合成为一个可下载音频文件。适合『写一段三人对白并生成语音』『设计角色名、角色台词、声音色彩，然后交给 TTS 合成』『A/B/C 分别用某种声音，按故事情节生成配音』这类任务。调用前 LLM 应先设计完整角色表和对白行：characters 里写每个角色 id/name/voice_mode/speaker_name/instruct/seed_text/language；dialogues 里写 speaker_id/text/emotion/pause_after_ms。必须为每个角色定义声音来源：如果用户没有指定音色、性别、年龄或感情色彩，LLM 必须根据角色名、人物关系、剧情语境和常识推断，默认填写 voice_mode=voice_design 和明确 instruct；只有用户明确指定系统预置音色时才填写 voice_mode=custom_voice 和 speaker_name。不要让角色缺少声音定义，也不要依赖后端默认音色。每个角色会先生成 voice seed audio，后续该角色所有台词用 seed audio 做 controllable clone，保持角色音色一致。后端选型一般不用 LLM 操心：默认不要传 model_name 和 clone_base_model_name，由后端 dispatch 路由到任意在线 TTS 服务，推理侧再按 character.voice_mode 自动决定加载 VoiceDesign / CustomVoice / Base 权重。仅当用户明确点名某个家族时再填 model_name：VoxCPM 系列 'VoxCPM2' 等；Qwen3-TTS 系列 'Qwen3-TTS-12Hz-1.7B-VoiceDesign'。speaker_name 取值空间随家族不同：voxcpm 用 linda/luoli/... ，qwen 用 Vivian/Serena/Uncle_Fu/... 。不要用于单段朗读（用 audio_tts），也不要用于修改实时聊天助手声音（用 set_chat_voice）。"
    tags: ["audio", "tts", "dialogue", "drama", "广播剧", "多角色", "对白", "人物对白", "人物对话", "角色声音", "声音色彩", "配音", "有声剧"]
    aliases: ["audio drama tts", "dialogue tts", "multi character tts", "广播剧配音", "多人对白配音", "角色对白语音", "人物对白配音", "有声剧生成"]
    examples:
      - "请写一段三人对白并生成语音"
      - "场景是雪山，A 是沧桑中年男声，B 是 Vivian，C 是小萝莉，生成一段广播剧音频"
      - "把这段多角色剧本做成配音文件"
      - "请设计一段人物对白，输出每个角色名、台词和声音色彩，然后生成音频文件"
    negative_examples:
      - "把这段文字念出来"
