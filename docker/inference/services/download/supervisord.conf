[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0
pidfile=/tmp/supervisord.pid
childlogdir=/app/logs/supervisor

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:supervisor-agent]
command=python -m inference.supervisor_agent
directory=/app
autostart=true
autorestart=true
startsecs=3
startretries=999
stopasgroup=true
killasgroup=true
stopsignal=TERM
stdout_logfile=/app/logs/supervisor/%(program_name)s.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
redirect_stderr=true
environment=PYTHONUNBUFFERED="1",PYTHONPATH="/app:/app/inference",VITOOM_SERVICE_GROUP="download",VITOOM_SUPERVISOR_CONF="/app/docker/inference/services/download/supervisord.conf"

[program:download]
command=python inference/download/main.py download
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=999
stopasgroup=true
killasgroup=true
stopsignal=TERM
stdout_logfile=/app/logs/supervisor/%(program_name)s.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
redirect_stderr=true
environment=PYTHONUNBUFFERED="1",PYTHONPATH="/app:/app/inference"
